<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NutriPlan | Smart Meal Planner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-wrapper" id="appWrapper">
  <div class="navbar" id="navbar" style="display: none;">
    <div class="logo">NUTRIPLAN</div>
    <div class="nav-links">
      <button class="nav-btn active" data-tab="mealplan">🍽️ Meal Plan</button>
      <button class="nav-btn" data-tab="favorites">⭐ Favorites</button>
      <button class="nav-btn" data-tab="recipes">🍳 Recipes</button>
      <button class="nav-btn" data-tab="profile">👤 Profile</button>
      <span class="user-greeting" id="userGreetingSpan"></span>
      <button class="nav-btn logout-nav" id="logoutNavBtn">Logout</button>
    </div>
  </div>

  <div class="main-content" id="mainContent"></div>
</div>

<script src="app.js"></script>
</body>
</html>
